name: Bitcoin Miner Monitor

on:
  schedule:
    # Chaque jour à 05:00 UTC = 07:00 heure française (CEST, UTC+2, avril–octobre)
    # En hiver (CET, UTC+1) : changer en '0 6 * * *' pour rester à 07:00 locale
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # nécessaire pour committer history.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run monitor
        env:
          F2POOL_TOKEN_CMINE: ${{ secrets.F2POOL_TOKEN_CMINE }}
          F2POOL_TOKEN_EVERMINER: ${{ secrets.F2POOL_TOKEN_EVERMINER }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
        run: node monitor.js

      - name: Commit history.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git diff --staged --quiet || git commit -m "chore: daily snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
