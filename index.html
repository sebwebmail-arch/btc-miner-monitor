<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Capone Watcher — Bitcoin Miner Monitor</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="https://capone.market/capone-fish-avatar-48-orange.svg">
<link rel="apple-touch-icon" href="https://capone.market/capone-fish-avatar-48-orange.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f5f7; color: #1a1a2e; font-size: 14px; min-height: 100vh; }

/* ── Topbar ── */
.topbar { background: #1a1a2e; padding: 14px 28px; display: flex; align-items: center; gap: 12px; color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.topbar img { width: 36px; height: 36px; }
.topbar .title { font-size: 17px; font-weight: 700; white-space: nowrap; }
.topbar .subtitle { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 1px; white-space: nowrap; }
.topbar .spacer { flex: 1; }
.topbar .updated { font-size: 11px; color: rgba(255,255,255,.4); text-align: right; }
.topbar .updated span { color: rgba(255,255,255,.7); font-weight: 600; }

/* ── Layout ── */
.page { max-width: 1080px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #999; margin-bottom: 8px; }

/* ── Health cards ── */
.health-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.health-card { background: white; border-radius: 10px; padding: 18px 20px; border-left: 4px solid #ddd; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.health-card .label { font-size: 10px; color: #999; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; }
.health-card .value { font-size: 32px; font-weight: 700; margin: 6px 0 3px; line-height: 1; }
.health-card .sub { font-size: 11px; color: #bbb; }
.card-online  { border-color: #27ae60; } .card-online .value  { color: #27ae60; }
.card-offline { border-color: #e67e22; } .card-offline .value { color: #e67e22; }
.card-dead    { border-color: #c0392b; } .card-dead .value    { color: #c0392b; }
.card-arch    { border-color: #bdc3c7; } .card-arch .value    { color: #bdc3c7; }

/* ── Panel ── */
.panel { background: white; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
.panel-header { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 13px; font-weight: 700; }
.panel-note { font-size: 11px; color: #bbb; }

/* ── Tabs ── */
.tabs { display: flex; border-bottom: 2px solid #f0f0f0; padding: 0 20px; }
.tab { padding: 10px 14px; font-size: 12px; font-weight: 600; color: #bbb; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .15s; }
.tab.active { color: #c0392b; border-color: #c0392b; }
.tab-content { display: none; } .tab-content.active { display: block; }

/* ── DC Grid ── */
.dc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 16px 20px; }
.dc-cell { border-radius: 8px; padding: 12px 10px; text-align: center; border: 1px solid #eee; transition: transform .1s, box-shadow .1s; cursor: pointer; position: relative; }
.dc-cell:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0,0,0,.08); }
.dc-cell.ok       { background: #f0faf4; border-color: #a8ddb8; }
.dc-cell.warn     { background: #fff8f0; border-color: #f5cba7; }
.dc-cell.critical { background: #fdf0ef; border-color: #f5b7b1; }
/* Sélection active */
.dc-cell.dc-selected                  { box-shadow: 0 0 0 2.5px #1a1a2e !important; transform: translateY(-2px); }
.dc-cell.dc-selected::after           { content: '✓'; position: absolute; top: 4px; right: 6px; font-size: 9px; font-weight: 800; color: #1a1a2e; }
.dc-cell.ok.dc-selected               { background: #c8edd6; border-color: #27ae60; }
.dc-cell.warn.dc-selected             { background: #fad9b0; border-color: #e67e22; }
.dc-cell.critical.dc-selected         { background: #f9c0bb; border-color: #c0392b; }
.dc-group { font-size: 9px; color: #bbb; font-weight: 700; margin-bottom: 2px; }
.dc-name  { font-size: 11px; font-weight: 700; color: #444; margin-bottom: 6px; }
.dc-status { font-size: 20px; font-weight: 800; }
.dc-cell.ok .dc-status { color: #27ae60; }
.dc-cell.warn .dc-status { color: #e67e22; }
.dc-cell.critical .dc-status { color: #c0392b; }
.dc-sub { font-size: 10px; color: #aaa; margin-top: 3px; }
/* Bandeau filtre DC actif */
.dc-filter-bar { display: none; padding: 8px 20px; background: #f0f4ff; border-top: 1px solid #dde4ff; font-size: 11px; color: #3730a3; align-items: center; gap: 8px; }
.dc-filter-bar.visible { display: flex; }
.dc-filter-bar-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.dc-filter-tag { background: #1a1a2e; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.dc-filter-clear { margin-left: auto; color: #c0392b; cursor: pointer; font-weight: 600; white-space: nowrap; }
.dc-filter-clear:hover { text-decoration: underline; }

/* ── Filter bar ── */
.filter-bar { padding: 10px 16px; border-bottom: 1px solid #f0f0f0; display: flex; gap: 8px; align-items: center; background: #fafafa; }
.filter-search { flex: 1; min-width: 160px; padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 12px; outline: none; background: white; }
.filter-search:focus { border-color: #c0392b; box-shadow: 0 0 0 2px rgba(192,57,43,.1); }
.filter-count { font-size: 11px; color: #bbb; margin-left: auto; white-space: nowrap; }
.filter-reset { font-size: 11px; color: #c0392b; cursor: pointer; white-space: nowrap; padding: 4px 8px; border-radius: 4px; }
.filter-reset:hover { background: #fdecea; }

/* ── Issues table ── */
.issues-table { width: 100%; border-collapse: collapse; }
.issues-table th { font-size: 10px; color: #bbb; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; padding: 0; text-align: left; background: #fafafa; border-bottom: 1px solid #f0f0f0; white-space: nowrap; position: relative; }
.th-inner { display: flex; align-items: center; padding: 9px 16px; gap: 6px; cursor: pointer; user-select: none; }
.th-inner:hover { color: #666; }
.th-inner.sorted { color: #c0392b; }
.sort-icon { font-size: 10px; opacity: .5; }
.th-inner.sorted .sort-icon { opacity: 1; }
.th-filter-btn { padding: 2px 5px; border-radius: 3px; cursor: pointer; font-size: 11px; color: #ccc; transition: all .15s; position: relative; }
.th-filter-btn:hover { background: #eee; color: #888; }
.th-filter-btn.active { color: #c0392b; background: #fdecea; }

/* ── Column dropdown ── */
.col-dropdown { position: absolute; top: 100%; left: 0; z-index: 200; background: white; border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12); min-width: 160px; padding: 6px 0; display: none; }
.col-dropdown.open { display: block; }
.col-dropdown-search { margin: 6px 10px; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 5px; font-size: 12px; outline: none; width: calc(100% - 20px); box-sizing: border-box; }
.col-dropdown-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; font-size: 12px; color: #444; font-weight: normal; letter-spacing: 0; text-transform: none; }
.col-dropdown-item:hover { background: #f5f5f5; }
.col-dropdown-item input[type=checkbox] { accent-color: #c0392b; width: 13px; height: 13px; cursor: pointer; }
.col-dropdown-sep { height: 1px; background: #f0f0f0; margin: 4px 0; }
.col-dropdown-actions { display: flex; gap: 8px; padding: 6px 12px; }
.col-dropdown-action { font-size: 11px; color: #c0392b; cursor: pointer; }
.col-dropdown-action:hover { text-decoration: underline; }

.issues-table td { padding: 9px 16px; border-bottom: 1px solid #f8f8f8; font-size: 12px; vertical-align: middle; }
.issues-table tr:last-child td { border-bottom: none; }
.issues-table tr:hover td { background: #fafafa; }
.issues-table .no-results { padding: 24px; text-align: center; color: #ccc; font-size: 12px; font-style: italic; }
.worker-name { font-family: monospace; font-weight: 700; font-size: 12px; }
.account-label { font-size: 11px; color: #999; }
.group-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; background: #eef2ff; color: #3730a3; }
.age-pill { display: inline-block; padding: 3px 9px; border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.pill-offline     { background: #fff3e0; color: #d35400; }
.pill-dead-recent { background: #fdecea; color: #c0392b; }
.pill-dead-mid    { background: #fdecea; color: #922b21; }
.pill-dead-old    { background: #f0f0f0; color: #999; }
.action-tag { font-size: 11px; color: #888; }

/* ── Dead tracker ── */
.dead-section { padding: 14px 20px; border-bottom: 1px solid #f5f5f5; }
.dead-section:last-child { border-bottom: none; }
.dead-section-title { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: #888; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-red { background: #c0392b; } .dot-orange { background: #e67e22; } .dot-grey { background: #bdc3c7; }
.dead-row td { padding: 7px 12px 7px 0; border-bottom: 1px solid #fafafa; font-size: 12px; vertical-align: middle; }
.dead-row:last-child td { border-bottom: none; }
.dead-row .dw { font-family: monospace; font-size: 12px; font-weight: 600; white-space: nowrap; }
.dead-row .dp { font-size: 11px; color: #aaa; }
.dead-row .dd { font-size: 12px; font-weight: 700; white-space: nowrap; }
.dead-row.red .dd { color: #c0392b; } .dead-row.orange .dd { color: #e67e22; } .dead-row.grey .dd { color: #bbb; }
.dead-account { font-size: 11px; color: #999; }
.dead-empty { font-size: 12px; color: #ccc; font-style: italic; padding: 8px 0; }
.arch-note { font-size: 11px; color: #ccc; font-style: italic; }

/* ── Anomaly badges ── */
.anomaly-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; white-space: nowrap; }
.badge-drop { background: #fdecea; color: #c0392b; }
.badge-volt { background: #fef9e7; color: #b7950b; }
.spark-td { line-height: 0; }

/* ── Online workers table ── */
.online-table { width: 100%; border-collapse: collapse; }
.online-table th { font-size: 10px; color: #bbb; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; padding: 0; text-align: left; background: #fafafa; border-bottom: 1px solid #f0f0f0; white-space: nowrap; position: relative; }
.online-table td { padding: 7px 14px; border-bottom: 1px solid #f8f8f8; font-size: 12px; vertical-align: middle; }
.online-table tr:last-child td { border-bottom: none; }
.online-table tr:hover td { background: #fafafa; }
.hr-now { font-weight: 700; color: #1a1a2e; font-size: 12px; }
.hr-avg { font-size: 11px; color: #aaa; }

/* ── Trend chart ── */
.trend-wrap { padding: 20px; }
.trend-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 12px; }
.trend-title { font-size: 12px; font-weight: 700; color: #555; }
.trend-legend { display: flex; gap: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.bars-wrap { display: flex; align-items: flex-end; gap: 2px; height: 80px; overflow: hidden; }
.bar-col { display: flex; flex-direction: column; align-items: center; gap: 0; flex: 1; min-width: 0; }
.bar-stack { display: flex; flex-direction: column; justify-content: flex-end; flex: 1; width: 100%; }
.bar-seg { width: 100%; border-radius: 2px 2px 0 0; min-height: 1px; }
.bar-seg.offline { background: #e67e22; }
.bar-seg.dead { background: #c0392b; }
.bar-seg.empty { background: #eee; border-radius: 2px; }
.bar-label { font-size: 8px; color: #ccc; margin-top: 3px; white-space: nowrap; overflow: hidden; }
.trend-bottom { margin-top: 8px; text-align: center; font-size: 10px; color: #ddd; }

/* ── Worker modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity .15s; pointer-events: none; }
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal { background: white; border-radius: 12px; width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,.2); overflow: hidden; transform: translateY(8px); transition: transform .15s; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-head { padding: 20px 24px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.modal-worker { font-family: monospace; font-size: 20px; font-weight: 800; color: #1a1a2e; }
.modal-close { color: #bbb; font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
.modal-close:hover { background: #f0f0f0; color: #555; }
.modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-field { display: flex; flex-direction: column; gap: 3px; }
.modal-field .mf-label { font-size: 10px; color: #bbb; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; }
.modal-field .mf-value { font-size: 13px; color: #333; font-weight: 600; }
.modal-field .mf-value.mono { font-family: monospace; font-size: 12px; }
.modal-status-bar { background: #f8f8f8; border-radius: 8px; padding: 14px 16px; }
.modal-status-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.modal-status-label { font-size: 11px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
.modal-duration { font-size: 22px; font-weight: 800; }
.dur-orange { color: #e67e22; } .dur-red { color: #c0392b; } .dur-grey { color: #bbb; }
.modal-timeline { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
.modal-timeline-fill { height: 100%; border-radius: 3px; transition: width .4s; }
.fill-orange { background: linear-gradient(90deg, #f39c12, #e67e22); }
.fill-red    { background: linear-gradient(90deg, #e74c3c, #c0392b); }
.fill-grey   { background: #ccc; }
.modal-timeline-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 9px; color: #ccc; }
.modal-reco { background: #fff8f0; border: 1px solid #f5cba7; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #7d4e00; line-height: 1.5; }
.modal-reco.reco-red { background: #fdf0ef; border-color: #f5b7b1; color: #7b241c; }
.modal-reco .reco-title { font-weight: 700; margin-bottom: 3px; }
.modal-foot { padding: 14px 24px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
.modal-f2pool-link { font-size: 12px; color: #3498db; text-decoration: none; font-weight: 600; }
.modal-f2pool-link:hover { text-decoration: underline; }
.range-btn { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #bbb; cursor: pointer; border: 1px solid #e8e8e8; background: white; }
.range-btn:hover { color: #555; border-color: #ccc; }
.range-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }

/* ── Loading / error ── */
#loading { display: flex; align-items: center; justify-content: center; height: 40vh; flex-direction: column; gap: 12px; color: #bbb; }
#error-msg { display: none; background: #fdf0ef; border: 1px solid #f5b7b1; color: #c0392b; padding: 16px 20px; border-radius: 8px; margin: 20px; font-size: 13px; }

@media (max-width: 640px) {
  .health-row { grid-template-columns: repeat(2, 1fr); }
  .dc-grid { grid-template-columns: repeat(3, 1fr); }

  /* Dead tracker + Trend: stack vertically */
  .dead-trend-grid { grid-template-columns: 1fr !important; }

  /* Issues table: enable horizontal scroll */
  #issues-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Reduce table cell padding */
  .issues-table td { padding: 6px 7px; }
  .issues-table .th-inner { padding: 7px 7px; }
  .online-table td { padding: 5px 7px; }
  .online-table .th-inner { padding: 7px 7px; }
  /* Headers : réduire letter-spacing qui force les colonnes larges */
  .issues-table th, .online-table th { letter-spacing: 0.3px; font-size: 9px; }
  /* Pill plus compact */
  .age-pill { padding: 2px 6px; font-size: 10px; }
  .group-badge { padding: 2px 5px; font-size: 9px; }
  /* Online table : masquer Account sur mobile (info dispo dans la modale) */
  .online-acct { display: none; }

  /* Hide less critical columns on mobile */
  .mob-hide { display: none !important; }

  /* Slightly tighten page horizontal padding */
  .page { padding: 16px 10px 40px; }

  /* Panel-level horizontal scroll — overflow:auto écrase overflow:hidden du parent */
  .panel-table { overflow: auto !important; -webkit-overflow-scrolling: touch; }

  /* Truncate long worker names */
  .worker-name { max-width: 76px; overflow: hidden; text-overflow: ellipsis;
                 white-space: nowrap; display: inline-block; vertical-align: middle; }

  /* Account: show short name only */
  .acct-long { display: none; }
  .acct-short { display: inline !important; }

  /* Datacenter: hide provider text, keep badge only */
  .prov-name { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <img src="https://capone.market/capone-fish-avatar-48-orange.svg" alt="Capone">
  <div>
    <div class="title">Capone Watcher</div>
    <div class="subtitle">Bitcoin Miner Fleet Monitor</div>
  </div>
  <div class="spacer"></div>
</div>

<div class="page">
  <div id="loading">
    <img src="https://capone.market/capone-fish-avatar-48-orange.svg" width="48" style="opacity:.3;animation:pulse 1.5s ease-in-out infinite">
    <span>Loading fleet data…</span>
  </div>
  <div id="error-msg"></div>
  <div id="app" style="display:none; display:flex; flex-direction:column; gap:20px;"></div>
</div>

<style>
@keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.5} }
</style>

<!-- Worker detail modal -->
<div class="modal-overlay" id="worker-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="worker-modal-inner"></div>
</div>

<script>
const ACCOUNTS_META = {
  cmine:    { name: 'Cyberian Mine' },
  everminer:{ name: 'Everminer' },
};
// Réplication client-side du groups.js pour la modale online workers
const GROUPS_RULES = [
  { id:'R1',    provider:'IZTM',           test: n => /^r/i.test(n) },
  { id:'R3',    provider:'Minto',          test: n => /^k2lx/i.test(n) },
  { id:'E1',    provider:'BitCluster',     test: n => /^\d+$/.test(n) },
  { id:'E2',    provider:'AmityAge',       test: n => /^aa/i.test(n) },
  { id:'U1+U2', provider:'Dataprana',      test: n => /^(ngs|yna|pie|olt|dga)/i.test(n) },
  { id:'U3',    provider:'ValueHash (NY)', test: n => /^(c21|e21)/i.test(n) },
  { id:'P1',    provider:'Altos',          test: n => /^s21/i.test(n) },
  { id:'F1',    provider:'Terahash',       test: n => /^18x/i.test(n) },
  { id:'OM',    provider:'Open Mine',      test: n => /^(omx|openfall)/i.test(n) },
];
function getGroupFromName(name) {
  return GROUPS_RULES.find(g => g.test(name)) || { id:'?', provider:'Unknown' };
}

// Icône "signal instable" — courbe oscillante
const WAVE_SVG = `<svg width="15" height="9" viewBox="0 0 15 9" style="display:inline-block;vertical-align:middle;margin-right:3px" fill="none"><path d="M0,6 L1.5,3 L3,7.5 L5,1 L6.5,7 L8,2 L9.5,7 L11,1.5 L12.5,6 L15,3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

// Icône "Monitor" — loupe (surveillance active)
const MONITOR_SVG = `<svg width="12" height="12" viewBox="0 0 12 12" style="display:inline-block;vertical-align:middle;margin-right:4px" fill="none"><circle cx="4.8" cy="4.8" r="3.5" stroke="currentColor" stroke-width="1.5"/><line x1="7.4" y1="7.4" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;

// Icône "Follow up" — loupe (problème à analyser)
const FOLLOWUP_SVG = `<svg width="12" height="12" viewBox="0 0 12 12" style="display:inline-block;vertical-align:middle;margin-right:4px" fill="none"><circle cx="4.8" cy="4.8" r="3.5" stroke="currentColor" stroke-width="1.5"/><line x1="7.4" y1="7.4" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;

const GROUPS_META = {
  'R1':   { name: 'IZTM' },
  'R3':   { name: 'Minto' },
  'E1':   { name: 'BitCluster' },
  'E2':   { name: 'AmityAge' },

// ── Helpers ──────────────────────────────────────────────────────────────────

function ageHours(isoStr) {
  if (!isoStr) return Infinity;
  return (Date.now() - new Date(isoStr).getTime()) / 3600000;
}
function ageDays(isoStr) { return ageHours(isoStr) / 24; }

function categoryOf(w) {
  const h = ageHours(w.last_share);
  if (h < 24)  return 'offline';
  const d = h / 24;
  if (d <= 7)  return 'dead_recent';
  if (d <= 90) return 'dead_mid';
  return 'dead_old';
}

function fmtAge(isoStr) {
  const h = ageHours(isoStr);
  if (h < 1)    return `${Math.round(h * 60)}m`;
  if (h < 24)   return `${Math.round(h)}h`;
  const d = Math.floor(h / 24);
  return `${d}d`;
}

function pillClass(cat) {
  return { offline:'pill-offline', dead_recent:'pill-dead-recent', dead_mid:'pill-dead-mid', dead_old:'pill-dead-old' }[cat];
}
function pillLabel(cat, isoStr) {
  if (cat === 'offline') return `Offline ${fmtAge(isoStr)}`;
  return `Dead ${fmtAge(isoStr)}`; // Dead 2h / Dead 1d / Dead 89d
}
function actionLabel(cat) {
  if (cat === 'offline')     return `${MONITOR_SVG}Monitor`;
  if (cat === 'dead_recent') return `${FOLLOWUP_SVG}Follow up`;
  if (cat === 'dead_mid')    return '🔔 Escalate';
  return '📦 Archive';
}

function renderDeadTracker() {
  const wrap = document.getElementById('dead-tracker-wrap');
  if (!wrap) return;

  const hasFilters = _dcFilter.size || _deadFilters.account.size || _deadFilters.datacenter.size || _deadSearch;

  const applyF = (w) => {
    if (_dcFilter.size && !_dcFilter.has(w.group_id)) return false;
    if (_deadFilters.account.size && !_deadFilters.account.has(w.account_name||w.account)) return false;
    if (_deadFilters.datacenter.size && !_deadFilters.datacenter.has(w.group_id)) return false;
    if (_deadSearch && !w.name.toLowerCase().includes(_deadSearch)) return false;
    return true;
  };

  const aBtn = document.getElementById('dead-btn-account');
  if (aBtn) aBtn.classList.toggle('active', _deadFilters.account.size > 0);
  const dBtn = document.getElementById('dead-btn-datacenter');
  if (dBtn) dBtn.classList.toggle('active', _deadFilters.datacenter.size > 0);

  const allWorkers = Object.values(_deadIssues).filter(w => categoryOf(w) !== 'dead_old');
  const cnt = document.getElementById('dead-count');
  if (cnt) cnt.textContent = hasFilters ? `${allWorkers.filter(applyF).length} / ${allWorkers.length} workers` : `${allWorkers.length} workers`;
  const rb = document.getElementById('dead-reset-btn');
  if (rb) rb.style.display = hasFilters ? 'block' : 'none';

  const totalArchived = Object.values(_deadIssues).filter(w => categoryOf(w) === 'dead_old').length;
  const thStyle = 'text-align:left;font-size:10px;color:#bbb;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 12px 5px 0;border-bottom:1px solid #f0f0f0';

  const cats = [
    { key:'offline',     label:'< 24 hours', sub:'just went offline · check now', dotColor:'#f1c40f' },
    { key:'dead_recent', label:'1–7 days', sub:'recent — monitor daily', dotColor:'#e67e22' },
    { key:'dead_mid',    label:'8–90 days',sub:'late — contact provider', dotColor:'#e74c3c' },
  ];

  const sections = cats.map(({ key, label, sub, dotColor }) => {
    const total   = Object.values(_deadIssues).filter(w => categoryOf(w) === key);
    const workers = total.filter(applyF).sort((a,b) => {
      const aA = (a.account_name||a.account||'').toLowerCase(), bA = (b.account_name||b.account||'').toLowerCase();
      if (aA !== bA) return aA < bA ? -1 : 1;
      return (a.group_id||'') < (b.group_id||'') ? -1 : (a.group_id||'') > (b.group_id||'') ? 1 : 0;
    });
    const countTxt = hasFilters
      ? `${workers.length} / ${total.length} worker${total.length !== 1 ? 's' : ''}`
      : total.length === 0 ? 'none' : `${total.length} worker${total.length > 1 ? 's' : ''}`;
    const count = `<span style="color:#bbb;font-weight:400;letter-spacing:0;text-transform:none">${sub} · ${countTxt}</span>`;
    const dot = `<div class="dot" style="background:${dotColor}"></div>`;

    if (workers.length === 0) {
      return `<div class="dead-section"><div class="dead-section-title">${dot}${label} ${count}</div></div>`;
    }

    const rows = workers.map(w => {
      const cat = categoryOf(w);
      const lastShareFmt = w.last_share ? new Date(w.last_share).toUTCString().replace(' GMT','') : '—';
      return `<tr>
        <td><span class="worker-name" style="cursor:pointer;text-decoration:underline dotted" onclick="openWorkerModal('${w.account}.${w.name}')">${w.name}</span></td>
        <td><span class="account-label">${w.account_name||w.account}</span></td>
        <td><span class="group-badge">${w.group_id}</span><span class="prov-name"> ${w.provider}</span></td>
        <td><span class="age-pill ${pillClass(cat)}">${pillLabel(cat, w.last_share)}</span></td>
        <td class="mob-hide" style="color:#aaa;font-size:11px">${lastShareFmt}</td>
        <td class="mob-hide"><span class="action-tag" style="cursor:pointer" onclick="openWorkerModal('${w.account}.${w.name}')">${actionLabel(cat)}</span></td>
      </tr>`;
    }).join('');

    return `<div class="dead-section">
      <div class="dead-section-title">${dot}${label} ${count}</div>
      <table class="issues-table">
        <thead><tr>
          <th style="${thStyle}">Worker</th>
          <th style="${thStyle}">Account</th>
          <th style="${thStyle}">Datacenter</th>
          <th style="${thStyle}">Status</th>
          <th class="mob-hide" style="${thStyle}">Last Share (UTC)</th>
          <th class="mob-hide" style="${thStyle}"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  const archivedCountTxt = totalArchived === 0 ? 'none' : `${totalArchived} worker${totalArchived !== 1 ? 's' : ''}`;
  const archiveNote = `<div class="dead-section">
    <div class="dead-section-title"><div class="dot dot-grey"></div>&gt; 90 days <span style="color:#bbb;font-weight:400;letter-spacing:0;text-transform:none">likely gone · ${archivedCountTxt}</span></div>
  </div>`;

  wrap.innerHTML = sections + archiveNote;
}

let _hashrate      = null; // hashrate.json
let _workerIssues  = null; // worker-issues.json
let _offlineStatus = null; // offline-status.json (real-time offline workers)
let _deadIssues    = {};   // history.json current_issues (dead/offline workers)

async function loadHashrateData() {
  try {
    const res = await fetch('./data/hashrate.json?t=' + Date.now());
    if (!res.ok) return;
    _hashrate = await res.json();
  } catch { /* hashrate.json pas encore dispo */ }
}

// Sélecteur de plage actif dans la modale (24h ou 72h)
let _modalRange = 24;
let _modalKey   = null;

function openWorkerModal(key) {
  // Fonctionne pour workers en issue ET workers online
  let w = _issues[key];
  if (!w) {
    // Reconstruit les infos depuis la clé hashrate
    const dot = key.indexOf('.');
    const accountUser = key.slice(0, dot);
    const workerName  = key.slice(dot + 1);
    const grp = getGroupFromName(workerName);
    w = {
      name: workerName, account: accountUser,
      account_name: ACCOUNTS_META[accountUser]?.name || accountUser,
      group_id: grp.id, provider: grp.provider,
      last_share: null,
    };
  }
  _modalKey = key;

  // Détermine si worker online (last_share null = reconstruit depuis hashrate.json)
  const isOnline = w.last_share === null && _hashrate?.workers?.[key]?.length > 0;
  const cat = isOnline ? 'online' : categoryOf(w);
  const h   = isOnline ? 0 : ageHours(w.last_share);
  const d   = h / 24;

  // Dernière timestamp connue pour les workers online
  const lastSnaps = _hashrate?.workers?.[key];
  const lastSnapTs = lastSnaps?.length ? lastSnaps[lastSnaps.length-1].ts : null;
  const lastHRTH  = lastSnaps?.length ? (lastSnaps[lastSnaps.length-1].hr / 1e12).toFixed(1) : null;

  // Recommandation
  let recoTitle, recoText, recoCls = '';
  if (isOnline) {
    recoTitle = '✓ Active';
    recoText  = `Worker is online and mining${lastHRTH ? ` at ${lastHRTH} TH/s` : ''}. Hashrate tracked every 30 minutes.`;
  } else if (cat === 'offline') {
    recoTitle = `${MONITOR_SVG}Monitor`;
    recoText  = 'Worker went offline recently. Wait for the next morning report — may recover on its own. If still offline tomorrow, contact the datacenter.';
  } else if (cat === 'dead_recent') {
    recoTitle = `${FOLLOWUP_SVG}Follow up`;
    recoText  = `Worker has been dead for ${Math.floor(d)} day${Math.floor(d)>1?'s':''}. Contact ${w.provider} to investigate. Escalate if no response within 48h.`;
    recoCls   = 'reco-red';
  } else if (cat === 'dead_mid') {
    recoTitle = '🔔 Escalate';
    recoText  = `Worker has been dead for ${Math.floor(d)} days. Formal escalation required with ${w.provider}. Consider replacement if no resolution within 7 days.`;
    recoCls   = 'reco-red';
  } else {
    recoTitle = '📦 Archive';
    recoText  = 'Worker has been dead for over 90 days. Likely permanently offline. No further action unless the miner is recovered.';
  }

  const lastShareFmt = isOnline
    ? (lastSnapTs ? `Last snapshot: ${new Date(lastSnapTs).toUTCString().replace(' GMT', ' UTC')}` : 'Active')
    : (w.last_share ? new Date(w.last_share).toUTCString().replace(' GMT', ' UTC') : 'Never');

  const statusPill = isOnline
    ? `<span class="age-pill" style="background:#eafaf1;color:#27ae60">● Online${lastHRTH ? ' · ' + lastHRTH + ' TH/s' : ''}</span>`
    : `<span class="age-pill ${pillClass(cat)}">${pillLabel(cat, w.last_share)}</span>`;

  const f2poolKey = w.account === 'cmine' ? 'dad5e8d0452ce3262084e3afef6003ec' : 'd87416827c22b5c9aadb86e10535c4e0';
  const f2poolUrl = `https://www.f2pool.com/mining-user/${f2poolKey}?user_name=${w.account}`;

  document.getElementById('worker-modal-inner').innerHTML = `
    <div class="modal-head">
      <div>
        <div class="modal-worker">${w.name}</div>
        <div style="margin-top:4px">${statusPill}</div>
      </div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body">
      <div class="modal-row">
        <div class="modal-field"><div class="mf-label">Account</div><div class="mf-value">${w.account_name || w.account}</div></div>
        <div class="modal-field"><div class="mf-label">Datacenter</div><div class="mf-value"><span class="group-badge">${w.group_id}</span> ${w.provider}</div></div>
      </div>
      <div class="modal-row">
        <div class="modal-field"><div class="mf-label">Host / IP</div><div class="mf-value mono">${w.host || '—'}</div></div>
        <div class="modal-field"><div class="mf-label">Last Share</div><div class="mf-value mono" style="font-size:11px">${lastShareFmt}</div></div>
      </div>

      <!-- Graphe hashrate -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div class="mf-label">Hashrate (TH/s)</div>
          <div style="display:flex;gap:4px">
            <div class="range-btn ${_modalRange===24?'active':''}" onclick="setModalRange(24)">24h</div>
            <div class="range-btn ${_modalRange===72?'active':''}" onclick="setModalRange(72)">72h</div>
          </div>
        </div>
        <div id="modal-chart-wrap">${renderHashrateChart(key, _modalRange)}</div>
      </div>

      <div class="modal-reco ${recoCls}">
        <div class="reco-title">${recoTitle}</div>
        ${recoText}
      </div>
    </div>
    <div class="modal-foot">
      <a class="modal-f2pool-link" href="${f2poolUrl}" target="_blank">→ View on f2pool ↗</a>
      <div style="font-size:11px;color:#ddd">ESC to close</div>
    </div>`;

  document.getElementById('worker-modal').classList.add('open');
}

function setModalRange(h) {
  _modalRange = h;
  if (_modalKey) {
    document.getElementById('modal-chart-wrap').innerHTML = renderHashrateChart(_modalKey, h);
    // Update buttons
    document.querySelectorAll('.range-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.textContent) === h);

function renderHashrateChart(key, rangeH) {
  const W = 420, H = 120, PL = 44, PR = 8, PT = 8, PB = 22;
  const cW = W - PL - PR, cH = H - PT - PB;

  if (!_hashrate || !_hashrate.workers || !_hashrate.workers[key]) {
    return `<div style="height:${H}px;display:flex;align-items:center;justify-content:center;background:#f8f8f8;border-radius:8px;color:#ccc;font-size:12px">
      Hashrate data not yet available — populates every 30 min
    </div>`;
  }

  const allPts = _hashrate.workers[key];
  const cutoff = Date.now() - rangeH * 3600000;
  const pts    = allPts.filter(p => new Date(p.ts).getTime() >= cutoff);

  if (pts.length < 2) {
    return `<div style="height:${H}px;display:flex;align-items:center;justify-content:center;background:#f8f8f8;border-radius:8px;color:#ccc;font-size:12px">
      Not enough data yet for this range
    </div>`;
  }

  const maxHR = Math.max(...pts.map(p => p.hr), 1);
  const maxTH = maxHR / 1e12;

  // Axe X fixe = fenêtre demandée (maintenant - rangeH → maintenant)
  const tAxisEnd   = Date.now();
  const tAxisStart = tAxisEnd - rangeH * 3600000;
  const tAxisSpan  = rangeH * 3600000;

  const px = (i) => PL + (new Date(pts[i].ts).getTime() - tAxisStart) / tAxisSpan * cW;
  const py = (i) => PT + cH - (pts[i].hr / maxHR) * cH;

  // Segments continus + lacunes → pointillés sur les runs manqués
  const { segs, gaps } = buildChartSegments(pts, px, py);
  const mFillElems = segs.map(idxs => {
    const f = `${px(idxs[0]).toFixed(1)},${PT+cH} ` + idxs.map(i=>`${px(i).toFixed(1)},${py(i).toFixed(1)}`).join(' ') + ` ${px(idxs[idxs.length-1]).toFixed(1)},${PT+cH}`;
    return `<polygon points="${f}" fill="url(#hrGrad)"/>`;
  }).join('');
  const mLineElems = segs.map(idxs => {
    const l = idxs.map(i=>`${px(i).toFixed(1)},${py(i).toFixed(1)}`).join(' ');
    return `<polyline points="${l}" fill="none" stroke="#3498db" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  }).join('');
  const mDashElems = gaps.map(g =>
    `<line x1="${g.x1.toFixed(1)}" y1="${g.y1.toFixed(1)}" x2="${g.x2.toFixed(1)}" y2="${g.y1.toFixed(1)}" stroke="#3498db" stroke-width="1.2" stroke-dasharray="5,4" opacity="0.4"/>`
  ).join('');

  // Y axis labels (0, mid, max)
  const yLabels = [0, maxTH/2, maxTH].map((v,i) => {
    const y = PT + cH - (i * cH / 2);
    return `<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#ccc">${v.toFixed(0)}</text>`;
  }).join('');

  // X axis : ticks aux heures rondes avec date au changement de jour
  const MONTHS_M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const stepH  = rangeH <= 24 ? 6 : 12;
  const stepMs = stepH * 3600000;
  const xLabels = [];
  const firstTick = Math.ceil(tAxisStart / stepMs) * stepMs;
  for (let t = firstTick; t <= tAxisEnd; t += stepMs) {
    const d   = new Date(t);
    const hh  = d.getUTCHours();
    const lbl = hh === 0 ? `${MONTHS_M[d.getUTCMonth()]} ${d.getUTCDate()}` : `${String(hh).padStart(2,'0')}:00`;
    const x   = (PL + (t - tAxisStart) / tAxisSpan * cW).toFixed(1);
    xLabels.push(`<text x="${x}" y="${PT+cH+14}" text-anchor="middle" font-size="9" fill="${hh===0?'#aaa':'#ccc'}" font-weight="${hh===0?'600':'400'}">${lbl}</text>`);
  }

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${H}px;display:block;background:#f8f9fb;border-radius:8px">
    <defs>
      <linearGradient id="hrGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3498db" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#3498db" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <!-- Grid lines -->
    <line x1="${PL}" y1="${PT}" x2="${PL+cW}" y2="${PT}" stroke="#eee" stroke-width="1"/>
    <line x1="${PL}" y1="${PT+cH/2}" x2="${PL+cW}" y2="${PT+cH/2}" stroke="#eee" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="${PL}" y1="${PT+cH}" x2="${PL+cW}" y2="${PT+cH}" stroke="#eee" stroke-width="1"/>
    <!-- Fill + Line (segments) + pointillés (lacunes) -->
    ${mFillElems}
    ${mDashElems}
    ${mLineElems}
    <!-- Y labels -->
    ${yLabels}
    <!-- X labels -->
    ${xLabels.join('')}
  </svg>`;
}

// ── Mini sparkline (utilisé dans les tables workers) ─────────────────────────

function miniSparkline(key, nSnaps = 12) {
  const snaps = _hashrate?.workers?.[key];
  if (!snaps || snaps.length < 2) return '<span style="color:#eee;font-size:10px">—</span>';
  const pts  = snaps.slice(-nSnaps);
  const W = 80, H = 24;
  const maxHR = Math.max(...pts.map(p => p.hr), 1);
  const minHR = Math.min(...pts.map(p => p.hr));
  const span  = maxHR - minHR || 1;
  const px = i => (i / (pts.length - 1)) * W;
  const py = i => H - ((pts[i].hr - minHR) / span) * H;
  const linePts = pts.map((_, i) => `${px(i).toFixed(0)},${py(i).toFixed(0)}`).join(' ');
  const lastHR  = pts[pts.length-1].hr;
  const firstHR = pts[0].hr;
  const color   = lastHR < firstHR * 0.6 ? '#e67e22' : lastHR < firstHR * 0.85 ? '#f1c40f' : '#27ae60';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:80px;height:24px;display:block">
    <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function renderOnlineTable() {
  const wrap = document.getElementById('online-table-wrap');
  const cnt  = document.getElementById('online-count');
  if (!wrap) return;

  if (!_hashrate?.workers) {
    wrap.innerHTML = `<div style="padding:24px;text-align:center;color:#ccc;font-size:12px">Hashrate data not yet available — collecting every 30 min</div>`;
    return;
  }

  // Build full worker list
  const all = [];
  for (const [key, snaps] of Object.entries(_hashrate.workers)) {
    if (snaps.length < 1) continue;
    // Exclure les workers déjà listés comme dead/offline dans history.json
    if (_deadIssues[key]) continue;
    const last    = snaps[snaps.length - 1];
    const recent6 = snaps.slice(-6);
    const avg3h   = recent6.reduce((s, p) => s + p.hr, 0) / recent6.length;
    if (avg3h < 1e12) continue;

    const dot         = key.indexOf('.');
    const accountUser = key.slice(0, dot);
    const workerName  = key.slice(dot + 1);
    const accountMeta = ACCOUNTS_META[accountUser] || { name: accountUser };
    const grp         = getGroupFromName(workerName);

    all.push({ key, accountUser, workerName, accountName: accountMeta.name,
               groupId: grp.id, provider: grp.provider, lastHR: last.hr, avg3h });
  }

  // Enrich with anomalies
  const wIssues = _workerIssues?.issues || {};
  all.forEach(w => {
    w.issue      = wIssues[w.key] || null;
    w.statusKey  = w.issue?.type || 'normal';
  });

  // Cache for dropdown enumeration
  _onlineAllWorkers = all;

  // Apply filters
  const hasFilters = _dcFilter.size || _onlineSearch || _onlineFilters.account.size || _onlineFilters.datacenter.size || _onlineFilters.status.size;

  const rb = document.getElementById('online-reset-btn');
  if (rb) rb.style.display = hasFilters ? 'block' : 'none';

  let workers = all.filter(w => {
    if (_dcFilter.size                 && !_dcFilter.has(w.groupId))                   return false;
    if (_onlineFilters.account.size    && !_onlineFilters.account.has(w.accountName)) return false;
    if (_onlineFilters.datacenter.size && !_onlineFilters.datacenter.has(w.groupId))  return false;
    if (_onlineFilters.status.size     && !_onlineFilters.status.has(w.statusKey))    return false;
    if (_onlineSearch && !w.workerName.toLowerCase().includes(_onlineSearch))          return false;
    return true;
  });

  // Update panel-note count (filtré si filtre actif)
  const anomalyCount = workers.filter(w => w.issue).length;
  if (cnt) cnt.textContent = hasFilters
    ? `${workers.length} / ${all.length} workers${anomalyCount ? ` · ⚠️ ${anomalyCount}` : ''}`
    : anomalyCount
      ? `${all.length} workers · ⚠️ ${anomalyCount} warning${anomalyCount > 1 ? 's' : ''}`
      : `${all.length} workers`;

  // Update filter count label (search bar)
  const fcnt = document.getElementById('online-filter-count');
  if (fcnt) fcnt.textContent = hasFilters ? `${workers.length} / ${all.length} workers` : '';

  // Sort: anomalies always first, then by selected column, tie-break account → group → name
  const anomalySortKey = w => w.issue?.type === 'level_drop' ? 0 : w.issue?.type === 'volatile' ? 1 : 2;

  workers.sort((a, b) => {
    const ap = anomalySortKey(a), bp = anomalySortKey(b);
    if (ap !== bp) return ap - bp;   // anomalies always first

    let va, vb;
    if      (_onlineSortCol === 'name')       { va = a.workerName;  vb = b.workerName; }
    else if (_onlineSortCol === 'account')    { va = a.accountName; vb = b.accountName; }
    else if (_onlineSortCol === 'datacenter') { va = a.groupId;     vb = b.groupId; }
    else                                      { va = a.lastHR;      vb = b.lastHR; }
    if (va < vb) return _onlineSortAsc ? -1 : 1;
    if (va > vb) return _onlineSortAsc ?  1 : -1;

    // Tie-break: account → group → name
    if (_onlineSortCol !== 'account' && a.accountName !== b.accountName)
      return a.accountName < b.accountName ? -1 : 1;
    if (_onlineSortCol !== 'datacenter' && a.groupId !== b.groupId)
      return a.groupId < b.groupId ? -1 : 1;
    return a.workerName < b.workerName ? -1 : a.workerName > b.workerName ? 1 : 0;
  });

  const si = col => `<span class="sort-icon">${_onlineSortCol===col?(_onlineSortAsc?'↑':'↓'):'↕'}</span>`;

  };

  const tbody = workers.map(w => {

    const avg3TH = (w.avg3h  / 1e12).toFixed(1);
    const spark  = miniSparkline(w.key, 12);

    let statusCell, rowStyle = '';
    if (w.issue?.type === 'level_drop') {
      statusCell = `<span class="anomaly-badge badge-drop">📉 Drop ${w.issue.drop_pct}%</span>`;
      rowStyle   = 'background:#fffbfb';
    } else if (w.issue?.type === 'volatile') {
      statusCell = `<span class="anomaly-badge badge-volt">${WAVE_SVG}Unstable</span>`;
      rowStyle   = 'background:#fffef5';
    } else {
      statusCell = `<span style="color:#27ae60;font-size:12px;font-weight:600">✓</span>`;
    }

    return `<tr style="${rowStyle}">
      <td><span class="worker-name" style="cursor:pointer;text-decoration:underline dotted" onclick="openWorkerModal('${w.key}')">${w.workerName}</span></td>
      <td class="online-acct"><span class="account-label acct-long">${w.accountName}</span><span class="account-label acct-short" style="display:none">${w.accountUser}</span></td>
      <td><span class="group-badge">${w.groupId}</span><span class="prov-name"> ${w.provider}</span></td>
      <td>${statusCell}</td>
      <td class="hr-now">${nowTH} TH/s</td>
      <td class="hr-avg mob-hide">${avg3TH} TH/s</td>
      <td class="spark-td mob-hide">${spark}</td>
      <td class="mob-hide"><span class="action-tag" style="cursor:pointer" onclick="openWorkerModal('${w.key}')">${MONITOR_SVG}Monitor</span></td>
    </tr>`;
  }).join('');

  const emptyRow = workers.length === 0
    ? `<tr><td colspan="8" style="padding:20px;text-align:center;color:#aaa;font-size:12px">No workers match the current filters.</td></tr>`
    : '';

  wrap.innerHTML = `<table class="online-table">
    <thead><tr>
      <th><div class="th-inner ${_onlineSortCol==='name'?'sorted':''}" onclick="sortOnline('name')">Worker ${si('name')}</div></th>
      <th class="online-acct"><div class="th-inner ${_onlineSortCol==='account'?'sorted':''}" onclick="sortOnline('account')">Account ${si('account')}</div>${filterBtn('account')}</th>
      <th><div class="th-inner ${_onlineSortCol==='datacenter'?'sorted':''}" onclick="sortOnline('datacenter')"><span class="mob-hide">Datacenter</span><span class="acct-short" style="display:none">DC</span> ${si('datacenter')}</div>${filterBtn('datacenter')}</th>
      <th><div class="th-inner">Status</div>${filterBtn('status')}</th>
      <th><div class="th-inner ${_onlineSortCol==='hr'?'sorted':''}" onclick="sortOnline('hr')">Now TH/s ${si('hr')}</div></th>
      <th class="mob-hide">Avg 3h</th>
      <th class="mob-hide">6h trend</th>
      <th class="mob-hide"></th>
    </tr></thead>
    <tbody>${emptyRow || tbody}</tbody>
  </table>`;
}

// ── Helpers graphes hashrate ───────────────────────────────────────────────────

const GAP_MS = 45 * 60 * 1000; // gap > 45min = run manqué → pointillés

/**
 * Découpe un tableau de points en segments continus + calcule les lacunes.
 * Retourne { segments: [[idx,...], ...], gaps: [{x1,y1,x2},...] }
 * px(i) / py(i) = fonctions de projection coordonnées SVG pour le point i.
 */
function buildChartSegments(pts, px, py) {
  const segs = [];
  let cur = [0];
  for (let i = 1; i < pts.length; i++) {
    const dt = new Date(pts[i].ts).getTime() - new Date(pts[i-1].ts).getTime();
    if (dt > GAP_MS) { segs.push(cur); cur = [i]; }
    else              { cur.push(i); }
  }
  segs.push(cur);

  const gaps = [];
  for (let s = 0; s < segs.length - 1; s++) {
    const last = segs[s][segs[s].length - 1];
    const next = segs[s + 1][0];
    gaps.push({ x1: px(last), y1: py(last), x2: px(next) });
    // y2 = py(last) → ligne horizontale à la dernière valeur connue
  }
  return { segs, gaps };
}

// ── Hashrate agrégé par account ───────────────────────────────────────────────

let _hrRange     = { cmine: 24, everminer: 24 };
let _hrChartData = {}; // { accountUser: { pts, tAxisStart, tAxisSpan, maxHR } }

function hrChartHover(event, accountUser) {
  const d = _hrChartData[accountUser];
  if (!d) return;
  const { pts, tAxisStart, tAxisSpan, maxHR } = d;
  const W = 860, H = 150, PL = 64, PR = 16, PT = 14, PB = 28;
  const cW = W - PL - PR, cH = H - PT - PB;

  // Conversion coords souris → coords SVG
  const svg   = event.currentTarget.closest('svg');
  const bbox  = svg.getBoundingClientRect();
  const svgX  = (event.clientX - bbox.left) * (W / bbox.width);

  // Timestamp correspondant à la position X
  const tHover = tAxisStart + (svgX - PL) / cW * tAxisSpan;

  // Point le plus proche
  let nearest = pts[0], minDist = Infinity;
  for (const p of pts) {
    const dist = Math.abs(new Date(p.ts).getTime() - tHover);
    if (dist < minDist) { minDist = dist; nearest = p; }
  }

  const xPos = PL + (new Date(nearest.ts).getTime() - tAxisStart) / tAxisSpan * cW;
  const yPos = PT + cH - (nearest.hr / maxHR) * cH;
  const thVal = (nearest.hr / 1e12).toFixed(0);
  const dt    = new Date(nearest.ts);
  const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const timeStr = `${MONTHS_S[dt.getUTCMonth()]} ${dt.getUTCDate()}, ${String(dt.getUTCHours()).padStart(2,'0')}:${String(dt.getUTCMinutes()).padStart(2,'0')}`;

  const cross = document.getElementById(`hrc-cross-${accountUser}`);
  const dot   = document.getElementById(`hrc-dot-${accountUser}`);
  const tip   = document.getElementById(`hrc-tip-${accountUser}`);
  const tipTime = document.getElementById(`hrc-tip-time-${accountUser}`);
  const tipVal  = document.getElementById(`hrc-tip-val-${accountUser}`);

  if (cross) { cross.setAttribute('x1', xPos); cross.setAttribute('x2', xPos); cross.setAttribute('opacity','1'); }
  if (dot)   { dot.setAttribute('cx', xPos); dot.setAttribute('cy', yPos); dot.setAttribute('opacity','1'); }

  if (tip && tipTime && tipVal) {
    const TW = 136, TH = 38;
    const tipX = (xPos + TW + 12 > W - PR) ? xPos - TW - 10 : xPos + 10;
    const tipY = PT + 4;
    tip.setAttribute('transform', `translate(${tipX.toFixed(1)},${tipY})`);
    tip.setAttribute('opacity','1');
    document.getElementById(`hrc-tip-bg-${accountUser}`).setAttribute('width', TW);
    tipTime.textContent = timeStr;
    tipVal.textContent  = `${thVal} TH/s`;
  }
}

function hrChartLeave(accountUser) {
  ['cross','dot','tip'].forEach(el => {
    const node = document.getElementById(`hrc-${el}-${accountUser}`);
    if (node) node.setAttribute('opacity','0');
  });
}

window.hrChartHover = hrChartHover;
window.hrChartLeave = hrChartLeave;

function setHrRange(accountUser, h) {
  _hrRange[accountUser] = h;
  document.querySelectorAll(`.hr-range-btn-${accountUser}`).forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.h) === h);
  });
  document.getElementById('hr-chart-' + accountUser).innerHTML = buildAccountHashrateChart(accountUser, h);
}
window.setHrRange = setHrRange;

function buildAccountHashrateChart(accountUser, rangeH) {
  if (!_hashrate || !_hashrate.workers) {
    return `<div style="height:140px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:12px;background:#f8f9fb;border-radius:8px">
      Hashrate data not yet available — collecting every 30 min</div>`;
  }

  // Agrège : somme de tous les workers du compte par timestamp
  const byTs = new Map();
  Object.entries(_hashrate.workers).forEach(([key, snaps]) => {
    if (!key.startsWith(accountUser + '.')) return;
    snaps.forEach(p => { byTs.set(p.ts, (byTs.get(p.ts) || 0) + p.hr); });
  });

  const cutoff = Date.now() - rangeH * 3600000;
  const pts = [...byTs.entries()]
    .map(([ts, hr]) => ({ ts, hr }))
    .filter(p => new Date(p.ts).getTime() >= cutoff)
    .sort((a, b) => new Date(a.ts) - new Date(b.ts));

  if (pts.length < 2) {
    return `<div style="height:140px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:12px;background:#f8f9fb;border-radius:8px">
      Not enough data for this range yet</div>`;
  }

  const W = 860, H = 150, PL = 64, PR = 16, PT = 14, PB = 28;
  const cW = W - PL - PR, cH = H - PT - PB;

  const maxHR  = Math.max(...pts.map(p => p.hr), 1);
  const maxTH  = maxHR / 1e12;
  const gradId = `hrGrad${accountUser}`;   // ← déclaré avant fillElems

  // Axe X fixe = fenêtre demandée (maintenant - rangeH → maintenant)
  // Les points se positionnent à l'intérieur, comme f2pool
  const tAxisEnd   = Date.now();
  const tAxisStart = tAxisEnd - rangeH * 3600000;
  const tAxisSpan  = rangeH * 3600000;

  const px = i => PL + (new Date(pts[i].ts).getTime() - tAxisStart) / tAxisSpan * cW;
  const py = i => PT + cH - (pts[i].hr / maxHR) * cH;

  // Segments continus + lacunes (runs manqués) → pointillés sur les lacunes
  const { segs, gaps } = buildChartSegments(pts, px, py);
  const fillElems = segs.map(idxs => {
    const f = `${px(idxs[0]).toFixed(1)},${PT+cH} ` + idxs.map(i=>`${px(i).toFixed(1)},${py(i).toFixed(1)}`).join(' ') + ` ${px(idxs[idxs.length-1]).toFixed(1)},${PT+cH}`;
    return `<polygon points="${f}" fill="url(#${gradId})"/>`;
  }).join('');
  const lineElems = segs.map(idxs => {
    const l = idxs.map(i=>`${px(i).toFixed(1)},${py(i).toFixed(1)}`).join(' ');
    return `<polyline points="${l}" fill="none" stroke="#3498db" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  }).join('');
  const dashElems = gaps.map(g =>
    `<line x1="${g.x1.toFixed(1)}" y1="${g.y1.toFixed(1)}" x2="${g.x2.toFixed(1)}" y2="${g.y1.toFixed(1)}" stroke="#3498db" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.4"/>`
  ).join('');

  // Y axis — 4 ticks
  const yLabels = [0,1,2,3,4].map(i => {
    const v  = maxTH * i / 4;
    const y  = PT + cH * (1 - i/4);
    const lbl = v >= 10000 ? `${(v/1000).toFixed(0)}k` : v >= 1000 ? `${(v/1000).toFixed(1)}k` : v.toFixed(0);
    return `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${PL+cW}" y2="${y.toFixed(1)}" stroke="${i===0?'#e8e8e8':'#f0f0f0'}" stroke-width="1" ${i>0&&i<4?'stroke-dasharray="4,3"':''}/>
      <text x="${PL-6}" y="${(y+3.5).toFixed(1)}" class="hr-yl" text-anchor="end" font-size="10" fill="#bbb">${lbl}</text>`;
  }).join('');

  // X axis : ticks aux heures rondes avec date façon f2pool
  // → "Jun 30" quand l'heure est 00:00, "HH:00" sinon
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const stepH  = rangeH <= 24 ? 6 : 12;
  const stepMs = stepH * 3600000;
  const xLabels = [];
  const firstTick = Math.ceil(tAxisStart / stepMs) * stepMs;
  for (let t = firstTick; t <= tAxisEnd; t += stepMs) {
    const d   = new Date(t);
    const hh  = d.getUTCHours();
    const lbl = hh === 0
      ? `${MONTHS[d.getUTCMonth()]} ${d.getUTCDate()}`
      : `${String(hh).padStart(2,'0')}:00`;
    const x   = (PL + (t - tAxisStart) / tAxisSpan * cW).toFixed(1);
    xLabels.push(
      `<line x1="${x}" y1="${PT}" x2="${x}" y2="${PT+cH}" stroke="${hh===0?'#e8e8e8':'#f5f5f5'}" stroke-width="${hh===0?1.5:1}"/>`,
      `<text x="${x}" y="${PT+cH+18}" class="hr-xl" text-anchor="middle" font-size="10" fill="${hh===0?'#aaa':'#bbb'}" font-weight="${hh===0?'600':'400'}">${lbl}</text>`
    );
  }

  const lastTH  = (pts[pts.length-1].hr / 1e12).toFixed(0);

  // Stocke les données pour le tooltip hover
  _hrChartData[accountUser] = { pts, tAxisStart, tAxisSpan, maxHR };

  return `<div>
    <div style="text-align:right;padding:0 4px 4px 0">
      <span style="font-size:26px;font-weight:800;color:#1a1a2e;line-height:1">${lastTH}</span>
      <span style="font-size:11px;color:#bbb;margin-left:4px">TH/s now</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#3498db" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="#3498db" stop-opacity="0.03"/>
        </linearGradient>
        <style>@media(max-width:480px){.hr-yl,.hr-xl{font-size:13px}}</style>
      </defs>
      ${yLabels}
      ${xLabels.join('')}
      ${fillElems}
      ${dashElems}
      ${lineElems}
      <!-- Live dot — ripple outward only, then snap back -->
      <circle cx="${px(pts.length-1).toFixed(1)}" cy="${py(pts.length-1).toFixed(1)}" r="3.5" fill="#3498db" opacity="0.3">
        <animate attributeName="r"       values="3.5;13;13"  keyTimes="0;0.75;1" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0;0"    keyTimes="0;0.75;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="${px(pts.length-1).toFixed(1)}" cy="${py(pts.length-1).toFixed(1)}" r="3.5" fill="#3498db"/>
      <!-- Hover elements -->
      <line id="hrc-cross-${accountUser}" x1="0" y1="${PT}" x2="0" y2="${PT+cH}" stroke="#3498db" stroke-width="1" stroke-dasharray="4,3" opacity="0" pointer-events="none"/>
      <circle id="hrc-dot-${accountUser}" cx="0" cy="0" r="4" fill="white" stroke="#3498db" stroke-width="2" opacity="0" pointer-events="none"/>
      <g id="hrc-tip-${accountUser}" opacity="0" pointer-events="none">
        <rect id="hrc-tip-bg-${accountUser}" x="0" y="0" width="136" height="38" rx="5" fill="white" stroke="#e0e0e0" stroke-width="1" filter="drop-shadow(0 2px 6px rgba(0,0,0,.1))"/>
        <text id="hrc-tip-time-${accountUser}" x="10" y="14" font-size="10" fill="#999"></text>
        <text id="hrc-tip-val-${accountUser}"  x="10" y="29" font-size="13" fill="#1a1a2e" font-weight="700"></text>
      </g>
      <!-- Zone de capture souris -->
      <rect x="${PL}" y="${PT}" width="${cW}" height="${cH}" fill="transparent" style="cursor:crosshair"
        onmousemove="hrChartHover(event,'${accountUser}')"
        onmouseleave="hrChartLeave('${accountUser}')"/>
    </svg>
  </div>`;
}

function buildHashrateSection() {
  const accounts = Object.entries(ACCOUNTS_META);
  const tabs = accounts.map(([k,m],i) =>
    `<div class="tab ${i===0?'active':''}" onclick="switchTab(this,'hr-tab-${k}')">${m.name}</div>`
  ).join('');

  const contents = accounts.map(([k,],i) => {
    const rh = _hrRange[k];
    return `<div class="tab-content ${i===0?'active':''}" id="hr-tab-${k}">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px 0">
        <div style="font-size:11px;color:#bbb">Total hashrate — all workers combined (TH/s)</div>
        <div style="display:flex;gap:4px">
          <div class="range-btn ${rh===24?'active':''} hr-range-btn-${k}" data-h="24" onclick="setHrRange('${k}',24)">24h</div>
          <div class="range-btn ${rh===72?'active':''} hr-range-btn-${k}" data-h="72" onclick="setHrRange('${k}',72)">72h</div>
        </div>
      </div>
      <div style="padding:10px 20px 16px" id="hr-chart-${k}">
        ${buildAccountHashrateChart(k, rh)}
      </div>
    </div>`;
  }).join('');

  return `
  <div>
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:baseline">
      <span>Hashrate — by account</span>
      <span style="font-size:10px;color:#bbb;font-weight:400;letter-spacing:0;text-transform:none">⏱ Real-time · updated every 30 min</span>
    </div>
    <div class="panel">
      <div class="tabs">${tabs}</div>
      ${contents}
    </div>
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────

async function render() {
  let data;
  try {
    const [histRes, hrRes, wiRes, osRes] = await Promise.all([
      fetch('./data/history.json?t='        + Date.now()),
      fetch('./data/hashrate.json?t='       + Date.now()).catch(() => null),
      fetch('./data/worker-issues.json?t='  + Date.now()).catch(() => null),
      fetch('./data/offline-status.json?t=' + Date.now()).catch(() => null),
    ]);
    if (!histRes.ok) throw new Error(`HTTP ${histRes.status}`);
    data = await histRes.json();
    if (hrRes && hrRes.ok) _hashrate      = await hrRes.json();
    if (wiRes && wiRes.ok) _workerIssues  = await wiRes.json();
    if (osRes && osRes.ok) _offlineStatus = await osRes.json();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error-msg');
    err.style.display = 'block';
    err.textContent = 'Could not load fleet data: ' + e.message;
    return;
  }

  const issues = data.current_issues || {};
  const snapshots = data.snapshots || [];
  _deadIssues = issues; // expose aux fonctions de rendu (exclure de Online Workers)

  // Topbar — affiche le timestamp hashrate.json (collecte 30min) en priorité
  const fmtTs = iso => {
    const d = new Date(iso);
    return `${d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',timeZone:'UTC'})} at ${d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'})} UTC`;
  };
  const monTs = data.last_updated || null;

  // Render sections
  const app = document.getElementById('app');
  app.innerHTML =
    buildHealthCards(issues, snapshots) +
    buildHashrateSection() +
    buildDatacenters(issues) +
    buildDeadTracker(issues) +
    buildOnlineWorkers();

  document.getElementById('loading').style.display = 'none';
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  app.style.gap = '20px';

  // Last update under Fleet health
  const lu = document.getElementById('fleet-last-update');
  if (lu && monTs) lu.textContent = `Last update: ${fmtTs(monTs)}`;

  // Populate workers requiring attention (sections lifecycle)
  renderDeadTracker();

  // Populate la table online workers (dérivée de hashrate.json)
  renderOnlineTable();
}

render();
</script>
</body>
</html>
