name: Hashrate Collector

on:
  schedule:
    # Every 30 minutes: 00:00, 00:30, 01:00, 01:30 ... 23:00, 23:30 UTC
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect hashrate + detect drops
        env:
          F2POOL_TOKEN_CMINE: ${{ secrets.F2POOL_TOKEN_CMINE }}
          F2POOL_TOKEN_EVERMINER: ${{ secrets.F2POOL_TOKEN_EVERMINER }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          # Email par compte (fallback sur ALERT_EMAIL si non défini)
          ALERT_EMAIL_CMINE: ${{ secrets.ALERT_EMAIL_CMINE }}
          ALERT_EMAIL_EVERMINER: ${{ secrets.ALERT_EMAIL_EVERMINER }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          # Telegram — bot commun, chat_id par compte
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_CMINE: ${{ secrets.TELEGRAM_CHAT_ID_CMINE }}
          TELEGRAM_CHAT_ID_EVERMINER: ${{ secrets.TELEGRAM_CHAT_ID_EVERMINER }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node hashrate-collector.js

      - name: Commit data files
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote -v
          git status
          git pull --rebase --autostash origin main
          git add data/hashrate.json
          git add data/alert-state.json   2>/dev/null || true
          git add data/worker-issues.json 2>/dev/null || true
          git status
          git diff --staged --quiet || git commit -m "data: hashrate $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push && echo "push OK" || { echo "push FAILED: $?"; exit 128; }
